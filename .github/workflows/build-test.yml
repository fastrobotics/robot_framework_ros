name: Build and Test CI
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-test:
    runs-on: ubuntu-22.04
     container:
      image: ros:noetic 

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          path: catkin_ws/src/robot_framework_ros

      - name: Install Build Tools
        run: |
          apt-get update -q
          apt-get install -y python3-catkin-tools python3-osrf-pycommon

      