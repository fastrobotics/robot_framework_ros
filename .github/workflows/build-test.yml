name: Build and Test CI
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-test:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          path: catkin_ws/src/robot_framework_ros

      
      - name: Install Dependencies
        run: ./scripts/setup_robot.sh

      - name: Build Tests
        run: |
          cd ../../
          source /opt/ros/noetic/setup.bash
          rm -rf build/ devel/
          catkin_make

      